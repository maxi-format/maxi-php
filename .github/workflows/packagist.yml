name: Update Packagist

on:
  push:
    branches:
      - main
  release:
    types: [published]

jobs:
  update-packagist:
    runs-on: ubuntu-latest

    steps:
      - name: Notify Packagist
        run: |
          response=$(curl -s -o /tmp/response.txt -w "%{http_code}" \
            -XPOST \
            -H "Content-Type: application/json" \
            "https://packagist.org/api/github?username=${{ secrets.PACKAGIST_USERNAME }}&apiToken=${{ secrets.PACKAGIST_TOKEN }}" \
            -d '{
              "repository": {
                "url": "https://github.com/maxi-format/maxi-php",
                "name": "maxi-format/maxi-php"
              }
            }')

          echo "HTTP Status: $response"
          cat /tmp/response.txt

          if [ "$response" -ne 202 ] && [ "$response" -ne 200 ]; then
            echo "❌ Failed to notify Packagist"
            exit 1
          fi

          echo "✅ Packagist notified!"
